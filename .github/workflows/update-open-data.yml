name: Optional open-data refresh
on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/fetch_ourairports.py || true
      - run: python scripts/fetch_gdelt.py || true
      - run: python scripts/fetch_speciesplus_static.py || true
      - run: python scripts/build_route_risk.py || true
      - run: python scripts/validate_data.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Refresh public-safe open data
          file_pattern: public/data/*.json data/raw/* data/processed/*
